<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Gui and Lu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body class="bg-black overflow-hidden select-none">

    <audio id="bg-music" loop><source src="assets/PokeLofi.mp3" type="audio/mpeg"></audio>
    <audio id="sound-open"><source src="assets/AbrirPokebola.mp3" type="audio/mpeg"></audio>
    <audio id="sound-click"><source src="assets/click.mp3" type="audio/mpeg"></audio>

    <div id="intro-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center transition-opacity duration-1000">
        <div class="absolute inset-0 z-0 bg-black/60">
            <img src="assets/mapa.png" class="absolute inset-0 w-full h-full object-cover pixelated blur-sm scale-110">
        </div>
        <div class="intro-title-box z-10 w-96 p-8 border-4 border-black bg-white mb-16 text-center shadow-2xl">
            <h1 class="text-pink-600 text-[14px] mb-3 uppercase tracking-widest font-bold">NOSSA AVENTURA</h1>
            <p class="text-[9px] text-gray-700 tracking-wider font-bold">De Gui para Lu ❤️</p>
        </div>
        <div id="pokebola-area" class="relative z-10 cursor-pointer" onclick="abrirPokebola()">
            <div id="pokebola-container" class="mx-auto flex items-center justify-center">
                <div id="pokebola-sprite" class="facing-closed animate-float"></div>
            </div>
            <div id="flash-effect" class="absolute inset-0 bg-white rounded-full opacity-0 transition-opacity duration-500"></div>
        </div>
        <div class="absolute bottom-12 z-10 w-80 p-6 border-4 border-black bg-white text-center shadow-lg animate-dialogPulse">
            <p id="pokebola-text" class="text-[10px] text-gray-800 tracking-widest leading-loose uppercase font-bold">HORA DO DUELO</p>
        </div>
    </div>

    <div id="main-game" class="relative w-full h-screen hidden">
        <img src="assets/mapa.png" class="absolute inset-0 w-full h-full object-cover pixelated">
        
        <div id="gengar-container" class="sprite-container" style="top: 40%; left: 30%;" onclick="mostrarInfo('gengar')">
            <div class="pixel-sprite gengar-sprite facing-front"></div>
        </div>
        <div id="snorlax-container" class="sprite-container" style="top: 60%; left: 70%;" onclick="mostrarInfo('snorlax')">
            <div class="pixel-sprite snorlax-sprite facing-front"></div>
        </div>

        <div id="battle-hud" class="absolute inset-0 pointer-events-none flex flex-col justify-between p-4 z-20">
            <div class="hud-box enemy-box self-start w-56 p-2 border-4 border-black bg-[#404040] text-white">
                <div class="flex justify-between items-center mb-1 text-[8px]"><span>LULU</span><span>Lv22</span></div>
                <div class="hp-container flex items-center bg-black p-[2px]">
                    <span class="text-[6px] mr-1 text-yellow-400 font-bold">HP</span>
                    <div class="w-full bg-gray-600 h-2"><div id="hp-enemy" class="bg-green-400 h-full w-full transition-all duration-500"></div></div>
                </div>
            </div>

            <div class="hud-box player-box self-end w-64 p-2 border-4 border-black bg-[#404040] text-white mr-4 mb-24">
                <div class="flex justify-between items-center mb-1 text-[8px]"><span>GUI</span><span>Lv24</span></div>
                <div class="hp-container flex items-center bg-black p-[2px]">
                    <span class="text-[6px] mr-1 text-yellow-400 font-bold">HP</span>
                    <div class="w-full bg-gray-600 h-2"><div id="hp-player" class="bg-green-400 h-full w-full transition-all duration-500"></div></div>
                </div>
            </div>

            <div class="command-bar absolute bottom-0 left-0 w-full h-24 bg-[#285068] border-t-8 border-[#383838] flex pointer-events-auto">
                <div class="w-3/5 p-4 flex items-center border-r-4 border-black bg-[#f8f8f8]"><p id="battle-text" class="text-black text-[10px] leading-relaxed">O que GUI irá fazer?</p></div>
                <div class="w-2/5 grid grid-cols-2 bg-white p-1 gap-1">
                    <button onclick="comando('LUTAR')" class="menu-btn uppercase">Ação</button>
                    <button onclick="comando('MOCHILA')" class="menu-btn uppercase">Mochila</button>
                    <button onclick="comando('POKéMON')" class="menu-btn uppercase">Memórias</button>
                    <button onclick="comando('CORRER')" class="menu-btn uppercase">Sair</button>
                </div>
            </div>
        </div>

        <div id="gallery-box" class="hidden absolute inset-0 z-[60] flex items-center justify-center bg-black/80 p-4">
            <div class="relative w-80 p-4 bg-white border-4 border-black shadow-2xl rounded-[20px]">
                <h2 class="text-[10px] font-bold mb-4 text-pink-600 text-center uppercase">Nossas Memórias</h2>
                <div class="relative h-48 bg-gray-200 border-2 border-black overflow-hidden mb-4">
                    <img id="gallery-photo" src="" class="w-full h-full object-cover">
                </div>
                <p id="gallery-caption" class="text-[8px] text-center text-gray-700 min-h-[20px] mb-4 italic"></p>
                <div class="flex justify-between gap-2">
                    <button onclick="navegarGaleria(-1)" class="menu-btn flex-1 py-2 text-[8px]">ANTERIOR</button>
                    <button onclick="navegarGaleria(1)" class="menu-btn flex-1 py-2 text-[8px]">PRÓXIMA</button>
                </div>
                <button onclick="fecharGaleria()" class="mt-4 w-full text-[8px] bg-pink-100 py-1 border-2 border-black">FECHAR</button>
            </div>
        </div>

        <div id="info-box" class="hidden absolute bottom-28 left-1/2 -translate-x-1/2 w-72 p-4 bg-white border-4 border-black z-50 shadow-2xl">
            <img id="poke-gif" src="" class="pixelated mx-auto h-20 mb-2">
            <h2 id="poke-name" class="text-[10px] font-bold mb-2 uppercase text-pink-600 text-center"></h2>
            <p id="poke-desc" class="text-[8px] leading-relaxed text-gray-700 h-24 overflow-y-auto whitespace-pre-wrap"></p>
            <button onclick="fecharInfo()" class="mt-3 w-full text-[8px] bg-gray-100 py-1 border-2 border-black uppercase">FECHAR</button>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
